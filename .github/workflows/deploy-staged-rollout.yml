name: Deploy Staged Rollout

on:
  workflow_dispatch:

jobs:
  staged-rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAS_STAGING_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK != '' }}
      HAS_PROD_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Validate staging synthetic secrets
        if: env.HAS_STAGING_HOOK == 'true'
        env:
          STAGING_SYNTHETIC_API_BASE_URL: ${{ secrets.STAGING_SYNTHETIC_API_BASE_URL }}
          STAGING_SYNTHETIC_EMAIL: ${{ secrets.STAGING_SYNTHETIC_EMAIL }}
          STAGING_SYNTHETIC_PASSWORD: ${{ secrets.STAGING_SYNTHETIC_PASSWORD }}
        run: |
          missing=()
          [[ -z "${STAGING_SYNTHETIC_API_BASE_URL}" ]] && missing+=("STAGING_SYNTHETIC_API_BASE_URL")
          [[ -z "${STAGING_SYNTHETIC_EMAIL}" ]] && missing+=("STAGING_SYNTHETIC_EMAIL")
          [[ -z "${STAGING_SYNTHETIC_PASSWORD}" ]] && missing+=("STAGING_SYNTHETIC_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required staging synthetic secrets: ${missing[*]}"
            exit 1
          fi

      - name: Trigger staging deploy
        if: env.HAS_STAGING_HOOK == 'true'
        run: curl -fsSL -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

      - name: Wait for staging boot
        if: env.HAS_STAGING_HOOK == 'true'
        run: sleep 90

      - name: Run staging synthetic check
        if: env.HAS_STAGING_HOOK == 'true'
        env:
          SYNTHETIC_API_BASE_URL: ${{ secrets.STAGING_SYNTHETIC_API_BASE_URL }}
          SYNTHETIC_EMAIL: ${{ secrets.STAGING_SYNTHETIC_EMAIL }}
          SYNTHETIC_PASSWORD: ${{ secrets.STAGING_SYNTHETIC_PASSWORD }}
          SYNTHETIC_HEALTH_TOKEN: ${{ secrets.STAGING_SYNTHETIC_HEALTH_TOKEN }}
          SYNTHETIC_TIMEOUT_MS: "20000"
        run: npm --prefix backend run synthetic:check

      - name: Ensure production deploy hook exists
        if: env.HAS_PROD_HOOK != 'true'
        run: |
          echo "RENDER_PROD_DEPLOY_HOOK is missing. Cannot trigger production deploy."
          exit 1

      - name: Validate production synthetic secrets
        if: env.HAS_PROD_HOOK == 'true'
        env:
          PROD_SYNTHETIC_API_BASE_URL: ${{ secrets.PROD_SYNTHETIC_API_BASE_URL }}
          PROD_SYNTHETIC_EMAIL: ${{ secrets.PROD_SYNTHETIC_EMAIL }}
          PROD_SYNTHETIC_PASSWORD: ${{ secrets.PROD_SYNTHETIC_PASSWORD }}
        run: |
          missing=()
          [[ -z "${PROD_SYNTHETIC_API_BASE_URL}" ]] && missing+=("PROD_SYNTHETIC_API_BASE_URL")
          [[ -z "${PROD_SYNTHETIC_EMAIL}" ]] && missing+=("PROD_SYNTHETIC_EMAIL")
          [[ -z "${PROD_SYNTHETIC_PASSWORD}" ]] && missing+=("PROD_SYNTHETIC_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required production synthetic secrets: ${missing[*]}"
            exit 1
          fi

      - name: Trigger production deploy
        if: env.HAS_PROD_HOOK == 'true'
        run: curl -fsSL -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"

      - name: Wait for production boot
        if: env.HAS_PROD_HOOK == 'true'
        run: sleep 90

      - name: Run production synthetic check
        if: env.HAS_PROD_HOOK == 'true'
        env:
          SYNTHETIC_API_BASE_URL: ${{ secrets.PROD_SYNTHETIC_API_BASE_URL }}
          SYNTHETIC_EMAIL: ${{ secrets.PROD_SYNTHETIC_EMAIL }}
          SYNTHETIC_PASSWORD: ${{ secrets.PROD_SYNTHETIC_PASSWORD }}
          SYNTHETIC_HEALTH_TOKEN: ${{ secrets.PROD_SYNTHETIC_HEALTH_TOKEN }}
          SYNTHETIC_TIMEOUT_MS: "20000"
        run: npm --prefix backend run synthetic:check
